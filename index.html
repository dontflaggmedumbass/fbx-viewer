<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Random Chaos Generator</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            overflow: hidden; /* Keeps the scrollbars from going nuts */
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }
        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9999;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border: 1px solid #444;
        }
        .chaos-obj {
            position: absolute;
            transition: all 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <div id="ui">
        <button onclick="spawnChaos()">ADD CHAOS</button>
        <button onclick="startAuto()">AUTO-MODE</button>
        <button onclick="location.reload()">NUKE EVERYTHING</button>
        <p id="counter">Objects: 0</p>
    </div>

    <script>
        let count = 0;

        function spawnChaos() {
            const obj = document.createElement('div');
            obj.className = 'chaos-obj';
            
            // Random Dimensions
            const w = Math.floor(Math.random() * 300) + 50;
            const h = Math.floor(Math.random() * 300) + 50;
            
            // Random Position
            const x = Math.floor(Math.random() * window.innerWidth);
            const y = Math.floor(Math.random() * window.innerHeight);
            
            // Random Look
            const color = `hsl(${Math.random() * 360}, 70%, 60%)`;
            const borderRadius = Math.random() > 0.5 ? '50%' : '0%';
            const rotation = Math.floor(Math.random() * 360);
            
            // Random Content
            const icons = ['★', '☠', '☣', '♥', '⚓', '⚡', '♣', '♦'];
            obj.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            
            // Apply Styles
            Object.assign(obj.style, {
                width: `${w}px`,
                height: `${h}px`,
                left: `${x}px`,
                top: `${y}px`,
                backgroundColor: color,
                borderRadius: borderRadius,
                transform: `rotate(${rotation}deg)`,
                fontSize: `${w / 3}px`
            });

            document.body.appendChild(obj);
            count++;
            document.getElementById('counter').innerText = `Objects: ${count}`;
        }

        function startAuto() {
            setInterval(spawnChaos, 100); // 10 objects per second
        }
    </script>
</body>
</html>
