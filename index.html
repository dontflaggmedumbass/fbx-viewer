<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>∞ TEXTURE WARP DEMO ∞</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #0ff;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-shadow: 0 0 20px #0ff;
        }
        h1 {
            font-size: 3rem;
            letter-spacing: 8px;
            margin-bottom: 20px;
            animation: glow 2s infinite alternate;
        }
        canvas {
            border: 4px solid #0ff;
            box-shadow: 0 0 60px #0ff, 0 0 120px #f0f;
            image-rendering: pixelated;
        }
        .info {
            position: absolute;
            bottom: 30px;
            font-size: 1.2rem;
            opacity: 0.8;
        }
        @keyframes glow {
            from { text-shadow: 0 0 20px #0ff; }
            to { text-shadow: 0 0 80px #0ff, 0 0 140px #f0f; }
        }
    </style>
</head>
<body>
    <h1>TEXTURE WARP</h1>
    <canvas id="c" width="900" height="600"></canvas>
    <div class="info">1 second → infinite liquid warp begins • pure HTML + JS • no external files</div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d', { alpha: false });
        const W = 900;
        const H = 600;
        canvas.width = W;
        canvas.height = H;

        // === CREATE INSANE PROCEDURAL TEXTURE (plasma / liquid metal style) ===
        let baseImageData = ctx.createImageData(W, H);
        let basePixels = baseImageData.data;

        for (let y = 0; y < H; y++) {
            for (let x = 0; x < W; x++) {
                const i = (y * W + x) * 4;

                // Triple sine plasma for insane color texture
                const r = Math.sin(x * 0.023 + y * 0.017) * 90 + 
                          Math.cos(x * 0.031 + y * 0.029) * 70 + 110;
                const g = Math.sin(x * 0.019 + y * 0.033) * 85 + 
                          Math.cos(x * 0.027 + y * 0.021) * 75 + 105;
                const b = Math.sin(x * 0.037 + y * 0.014) * 95 + 
                          Math.cos(x * 0.018 + y * 0.038) * 65 + 115;

                basePixels[i]     = Math.max(0, Math.min(255, r));
                basePixels[i + 1] = Math.max(0, Math.min(255, g));
                basePixels[i + 2] = Math.max(0, Math.min(255, b));
                basePixels[i + 3] = 255;
            }
        }

        // Draw initial texture
        ctx.putImageData(baseImageData, 0, 0);

        // Capture original pixels for warping
        let originalData = ctx.getImageData(0, 0, W, H);

        // === WARP ENGINE (starts after exactly 1 second) ===
        let time = 0;
        let warping = false;
        let amp = 28;        // warp strength
        let freq = 0.028;    // wave frequency
        let speed = 0.085;   // animation speed

        function startWarp() {
            warping = true;
            document.querySelector('h1').textContent = "WARPING...";
            requestAnimationFrame(animateWarp);
        }

        function animateWarp() {
            if (!warping) return;

            const frameData = ctx.createImageData(W, H);
            const framePixels = frameData.data;
            const origPixels = originalData.data;

            time += speed;

            for (let y = 0; y < H; y++) {
                for (let x = 0; x < W; x++) {
                    // Dual-axis liquid warp (feels like molten metal / water)
                    const dx = Math.sin(y * freq + time * 1.3) * amp +
                               Math.cos(x * freq * 0.7 + time * 0.8) * (amp * 0.6);
                    
                    const dy = Math.cos(x * freq * 1.2 + time * 1.1) * amp +
                               Math.sin(y * freq * 0.9 + time * 0.7) * (amp * 0.5);

                    let srcX = Math.floor(x + dx);
                    let srcY = Math.floor(y + dy);

                    // Clamp to bounds (no black edges)
                    srcX = Math.max(0, Math.min(W - 1, srcX));
                    srcY = Math.max(0, Math.min(H - 1, srcY));

                    const srcIndex = (srcY * W + srcX) * 4;
                    const destIndex = (y * W + x) * 4;

                    framePixels[destIndex]     = origPixels[srcIndex];
                    framePixels[destIndex + 1] = origPixels[srcIndex + 1];
                    framePixels[destIndex + 2] = origPixels[srcIndex + 2];
                    framePixels[destIndex + 3] = 255;
                }
            }

            ctx.putImageData(frameData, 0, 0);
            requestAnimationFrame(animateWarp);
        }

        // === START THE MAGIC ===
        setTimeout(() => {
            startWarp();
        }, 1000);

        // Bonus: click anywhere to change warp intensity (limitless fun)
        canvas.addEventListener('click', () => {
            if (warping) {
                amp = Math.random() * 55 + 15;
                freq = Math.random() * 0.05 + 0.015;
                console.log('%cWARP PARAMETERS CHANGED 🔥', 'color:#f0f;font-size:20px');
            }
        });

        // Double-click = reset original texture (for testing)
        canvas.addEventListener('dblclick', () => {
            if (warping) {
                warping = false;
                ctx.putImageData(originalData, 0, 0);
                setTimeout(() => {
                    warping = true;
                    time = 0;
                    requestAnimationFrame(animateWarp);
                }, 300);
            }
        });
    </script>
</body>
</html>
